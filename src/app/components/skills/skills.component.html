<section class="section" id="stack" appReveal>
  <p class="eyebrow">The Stack</p>
  <h2 class="section-title">Four domains, one workflow</h2>

  <div class="skills-grid">
    @for (group of groups; track group.domain) {
      <article class="skill-card" [class]="'skill-card--' + group.domain">
        <h3>{{ group.title }}</h3>
        <p>{{ group.blurb }}</p>
        <div class="skill-card__chips">
          @for (skill of group.skills; track skill) {
            <span class="chip">{{ skill }}</span>
          }
        </div>
      </article>
    }
  </div>
</section>
