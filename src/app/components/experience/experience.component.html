<section class="section" id="experience" appReveal>
  <p class="eyebrow">Work</p>
  <h2 class="section-title">Experience</h2>

  <div class="timeline">
    @for (item of experience; track item.role) {
      <article class="timeline__item" [class]="'timeline__item--' + item.domain">
        <div class="timeline__head">
          <h3>{{ item.role }}</h3>
          <span class="timeline__period">{{ item.period }}</span>
        </div>
        <p class="timeline__org">{{ item.org }}</p>
        <ul>
          @for (point of item.points; track point) {
            <li>{{ point }}</li>
          }
        </ul>
      </article>
    }
  </div>
</section>
