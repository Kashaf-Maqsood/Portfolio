<section class="section" id="education" appReveal>
  <p class="eyebrow">Education</p>
  <h2 class="section-title">Where it started</h2>

  <div class="edu-list">
    @for (item of education; track item.degree) {
      <article class="edu-item" [class]="'edu-item--' + item.domain">
        <div>
          <h3>{{ item.degree }}</h3>
          <p class="edu-item__org">{{ item.org }}</p>
        </div>
        <div class="edu-item__meta">
          <span class="edu-item__period">{{ item.period }}</span>
          <span class="edu-item__detail">{{ item.detail }}</span>
        </div>
      </article>
    }
  </div>
</section>
